<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0620" />
      <stop offset="100%" stop-color="#030210" />
    </radialGradient>
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="25%" stop-color="#000" />
      <stop offset="40%" stop-color="#b478ff" stop-opacity="0.8" />
      <stop offset="55%" stop-color="#ff9944" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#b478ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="35%" stop-color="transparent" />
      <stop offset="48%" stop-color="#ffcc66" stop-opacity="0.7" />
      <stop offset="55%" stop-color="#b478ff" stop-opacity="0.4" />
      <stop offset="70%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.2" fill="#fff" opacity="0.6" />
  <circle cx="250" cy="150" r="0.8" fill="#c8b0ff" opacity="0.4" />
  <circle cx="1050" cy="100" r="1" fill="#fff" opacity="0.5" />
  <circle cx="900" cy="520" r="1.3" fill="#c8b0ff" opacity="0.3" />
  <circle cx="150" cy="480" r="0.9" fill="#fff" opacity="0.4" />
  <circle cx="1100" cy="300" r="1.1" fill="#fff" opacity="0.5" />
  <circle cx="80" cy="300" r="0.7" fill="#c8b0ff" opacity="0.3" />
  <circle cx="400" cy="550" r="1" fill="#fff" opacity="0.4" />
  <circle cx="800" cy="80" r="0.8" fill="#fff" opacity="0.5" />
  <circle cx="1000" cy="450" r="1.2" fill="#c8b0ff" opacity="0.3" />

  <!-- Accretion disk -->
  <ellipse cx="600" cy="315" rx="200" ry="80" fill="url(#disk)" />

  <!-- Photon ring -->
  <circle cx="600" cy="315" r="110" fill="url(#glow)" />

  <!-- Black hole -->
  <circle cx="600" cy="315" r="70" fill="#030210" />
  <circle cx="600" cy="315" r="70" fill="none" stroke="#b478ff" stroke-width="1" opacity="0.25" />

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="200" letter-spacing="16" fill="#ffffff" opacity="0.9">GRAVITY LENSING</text>

  <!-- Tagline -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#c8b0ff" opacity="0.6">Common Lisp Package Registry &amp; Scope</text>
</svg>
