<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Accretion disk gradient -->
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="#000" />
      <stop offset="45%" stop-color="#b478ff" stop-opacity="0.9" />
      <stop offset="55%" stop-color="#ff9944" stop-opacity="0.7" />
      <stop offset="70%" stop-color="#b478ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <!-- Photon ring glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="transparent" />
      <stop offset="52%" stop-color="#ffcc66" stop-opacity="0.8" />
      <stop offset="58%" stop-color="#b478ff" stop-opacity="0.5" />
      <stop offset="75%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#030210" />

  <!-- Accretion disk (ellipse for perspective) -->
  <ellipse cx="64" cy="64" rx="48" ry="20" fill="url(#disk)" />

  <!-- Photon ring -->
  <circle cx="64" cy="64" r="28" fill="url(#glow)" />

  <!-- Black hole shadow -->
  <circle cx="64" cy="64" r="18" fill="#030210" />

  <!-- Subtle edge highlight -->
  <circle cx="64" cy="64" r="18" fill="none" stroke="#b478ff" stroke-width="0.8" opacity="0.3" />
</svg>
